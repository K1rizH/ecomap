<!DOCTYPE html>
<html lang="ru">
<head>
    <script>

if(localStorage.getItem('loggedIn') !== 'true'){

alert('Сначала войдите в аккаунт');

window.location.href = 'login.html';

}

</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Разместить отходы | EcoMap</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
    <style>
.leaflet-control-attribution,
.leaflet-bottom.leaflet-right{
display:none !important;
}
</style>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
background:#07120e;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* Фон */

body::before{
content:'';
position:fixed;
width:100%;
height:100%;

background:
radial-gradient(circle at 20% 20%,rgba(0,255,150,.22),transparent 30%),
radial-gradient(circle at 80% 30%,rgba(0,200,255,.12),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(0,255,100,.12),transparent 35%);

z-index:-2;
}

/* Header */

header{
padding:25px 8%;

display:flex;
justify-content:space-between;
align-items:center;

backdrop-filter:blur(20px);
}

.logo{
font-size:30px;
font-weight:800;
color:#35ff9d;
}

.back{
color:white;
text-decoration:none;

padding:12px 20px;

border-radius:14px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

transition:.3s;
}

.back:hover{
color:#35ff9d;
}

/* Контейнер */

.container{
max-width:950px;
margin:auto;
padding:20px;
}

/* Заголовок */

.title{
text-align:center;
margin-bottom:40px;
}

.title h1{
font-size:48px;
margin-bottom:15px;
}

.title p{
color:#b8c6c0;
font-size:18px;
}

/* Форма */

.form-box{
padding:40px;

border-radius:30px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);
}

.form-group{
margin-bottom:22px;
}

label{
display:block;
margin-bottom:10px;
font-weight:600;
}

input,
textarea,
select{
width:100%;

padding:16px;

border:none;
outline:none;

border-radius:16px;

background:rgba(255,255,255,.08);

color:white;

font-size:15px;
}

textarea{
height:120px;
resize:none;
}

option{
background:#102019;
}

/* Карта */

#map{
height:350px;

border-radius:25px;

overflow:hidden;

margin-top:20px;

border:1px solid rgba(255,255,255,.1);
}

/* Инфо */

.map-info{
margin-top:15px;

color:#35ff9d;

font-size:14px;
}

/* Кнопка */

.btn{
width:100%;

padding:18px;

margin-top:30px;

border:none;

border-radius:18px;

background:#35ff9d;

color:#03100b;

font-size:17px;

font-weight:700;

cursor:pointer;

transition:.3s;

box-shadow:
0 0 25px rgba(53,255,157,.3);
}

.btn:hover{
transform:translateY(-3px);
}

/* Сообщение */

.message{
margin-top:20px;
text-align:center;
color:#35ff9d;
}

/* Leaflet fix */

.leaflet-container{
background:#0d1f17;
}

@media(max-width:700px){

.title h1{
font-size:34px;
}

.form-box{
padding:25px;
}

}

</style>
</head>
    <script type="module">

import { db } from './firebase.js';

import {
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.db = db;
window.addDoc = addDoc;
window.collection = collection;

console.log("Firebase подключен");

</script>
<body>

<header>

<div class="logo">
EcoMap
</div>

<a href="cabinet.html" class="back">
Назад
</a>

</header>

<div class="container">

<div class="title">

<h1>
♻ Размещение вторсырья
</h1>

<p>
Добавьте новое объявление и отметьте точку на карте
</p>

</div>

<div class="form-box">

<div class="form-group">

<label>
Тип отходов
</label>

<select id="type">
<option>Пластик</option>
<option>Макулатура</option>
<option>Стекло</option>
<option>Металл</option>
<option>Электроника</option>
</select>

</div>

<div class="form-group">

<label>
Количество
</label>

<input
type="text"
id="amount"
placeholder="Например: 25 кг"
>

</div>

<div class="form-group">

<label>
Адрес
</label>

<input
type="text"
id="address"
placeholder="Введите адрес"
>

</div>

<div class="form-group">

<label>
Описание
</label>

<textarea
id="description"
placeholder="Опишите состояние отходов"
></textarea>

</div>

<div class="form-group">

<label>
Фотография
</label>

<input
type="file"
id="photo"
accept="image/*"
>

</div>

<label>
📍 Выберите точку на карте
</label>

<div id="map"></div>

<div class="map-info" id="coords">
Координаты не выбраны
</div>

<button class="btn" onclick="saveWaste()">
Опубликовать объявление
</button>

<div class="message" id="message"></div>

</div>

</div>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>

/* Карта */

const map =
L.map('map').setView([60.9397,76.5696],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:''
}
).addTo(map);

let marker = null;

let selectedLat = null;
let selectedLng = null;

/* Выбор точки */

map.on('click',function(e){

selectedLat = e.latlng.lat;
selectedLng = e.latlng.lng;

if(marker){
map.removeLayer(marker);
}

marker =
L.marker(e.latlng).addTo(map);

document.getElementById('coords').innerHTML =
'Выбраны координаты: ' +
selectedLat.toFixed(5) +
', ' +
selectedLng.toFixed(5);

});

/* Сохранение */

async function saveWaste(){

const type =
document.getElementById('type').value;

const amount =
document.getElementById('amount').value;

const address =
document.getElementById('address').value;

const description =
document.getElementById('description').value;

const photoInput =
document.getElementById('photo');

const message =
document.getElementById('message');

if(
!amount ||
!address ||
!description
){
message.innerHTML =
'Заполните все поля';
return;
}

if(
selectedLat === null ||
selectedLng === null
){
message.innerHTML =
'Выберите точку на карте';
return;
}

/* если фото выбрано */

if(photoInput.files.length > 0){

const reader = new FileReader();

reader.onload = function(e){

saveData(e.target.result);

};

reader.readAsDataURL(
photoInput.files[0]
);

}else{

saveData('');

}

async function saveData(photo){

const waste = {

type,
amount,
address,
description,
photo,

lat:selectedLat,
lng:selectedLng,

status:'Активно'

};

await addDoc(
collection(window.db, "wastes"),
waste
);

message.innerHTML =
'✅ Объявление успешно опубликовано';

setTimeout(()=>{

window.location.href =
'my-listings.html';

},1200);

}

}



</script>

</body>
</html>
