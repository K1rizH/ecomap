<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Разместить отходы | EcoMap</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
background:#07120e;
color:white;
min-height:100vh;
}

.container{
max-width:900px;
margin:auto;
padding:50px 20px;
}

h1{
text-align:center;
margin-bottom:40px;
font-size:42px;
}

.form-box{
padding:40px;
background:rgba(255,255,255,.05);
border-radius:25px;
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(20px);
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:10px;
font-weight:600;
}

input,
textarea,
select{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,.08);
color:white;
font-size:15px;
}

select option{
background:#102019;
}

textarea{
height:120px;
resize:none;
}

.btn{
width:100%;
padding:18px;
background:#35ff9d;
border:none;
border-radius:15px;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
}

.map-preview{
margin-top:25px;
height:250px;
border-radius:20px;
background:
linear-gradient(
135deg,
#0d1f17,
#123024
);

display:flex;
align-items:center;
justify-content:center;

color:#35ff9d;
font-size:22px;
}

.back{
display:inline-block;
margin-bottom:25px;
color:#35ff9d;
text-decoration:none;
}

</style>
</head>
<body>

<div class="container">

<a href="cabinet.html" class="back">
← Назад
</a>

<h1>
♻ Размещение вторсырья
</h1>

<div class="form-box">

<form>

<div class="form-group">

<label>
Тип отходов
</label>

<select id="type">

<option>Пластик</option>
<option>Макулатура</option>
<option>Стекло</option>
<option>Металл</option>
<option>Электроника</option>

</select>

</div>

<div class="form-group">

<label>
Количество
</label>

<input
id="amount"
type="text"
placeholder="Например: 25 кг"
>

</div>

<div class="form-group">

<label>
Адрес
</label>

<input
id="address"
type="text"
placeholder="Введите адрес"
>

</div>

<div class="form-group">

<label>
Описание
</label>

<textarea
id="description"
placeholder="Опишите состояние отходов"
></textarea>

</div>

<div class="form-group">

<label>
Фотография
</label>

<input type="file">

</div>

<div class="map-preview">
📍 Здесь будет интерактивная карта
</div>

<br>

<button
type="button"
class="btn"
onclick="saveWaste()"
>
Опубликовать объявление
</button>

</form>

</div>

</div>

<script>

function saveWaste(){

const waste = {

type:
document.getElementById('type').value,

amount:
document.getElementById('amount').value,

address:
document.getElementById('address').value,

description:
document.getElementById('description').value,

status:'Активно'

};

let wastes =
JSON.parse(localStorage.getItem('wastes')) || [];

wastes.push(waste);

localStorage.setItem(
'wastes',
JSON.stringify(wastes)
);

alert('Объявление опубликовано');

window.location.href='my-listings.html';

}

</script>

</body>
</html>
