<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Регистрация | EcoMap</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
background:#07120e;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
overflow:hidden;
}

/* Фон */

body::before{
content:'';
position:absolute;
width:100%;
height:100%;

background:
radial-gradient(circle at 20% 20%,rgba(0,255,150,.25),transparent 35%),
radial-gradient(circle at 80% 30%,rgba(0,200,255,.15),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(0,255,100,.15),transparent 35%);

z-index:-2;
}

/* Карточка */

.box{
width:450px;

padding:45px;

background:rgba(255,255,255,.05);

border-radius:30px;

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

box-shadow:
0 0 40px rgba(53,255,157,.12);
}

.logo{
text-align:center;

font-size:38px;

font-weight:800;

margin-bottom:10px;

color:#35ff9d;
}

.subtitle{
text-align:center;

color:#b7c6bf;

margin-bottom:35px;
}

.input-group{
margin-bottom:18px;
}

input{
width:100%;

padding:16px;

border:none;
outline:none;

border-radius:14px;

background:rgba(255,255,255,.08);

color:white;

font-size:15px;
}

input::placeholder{
color:#aab5af;
}

button{
width:100%;

padding:17px;

margin-top:10px;

border:none;

border-radius:15px;

background:#35ff9d;

color:#03100b;

font-weight:700;

font-size:16px;

cursor:pointer;

transition:.3s;

box-shadow:
0 0 25px rgba(53,255,157,.35);
}

button:hover{
transform:translateY(-3px);
}

.message{
margin-top:18px;

text-align:center;

font-size:14px;

color:#35ff9d;
}

.links{
margin-top:20px;
text-align:center;
}

.links a{
color:#35ff9d;
text-decoration:none;
}

</style>
</head>
<body>

<div class="box">

<div class="logo">
EcoMap
</div>

<div class="subtitle">
Создание аккаунта пользователя
</div>

<div class="input-group">
<input id="name" type="text" placeholder="Имя">
</div>

<div class="input-group">
<input id="email" type="email" placeholder="Email">
</div>

<div class="input-group">
<input id="phone" type="text" placeholder="Телефон">
</div>

<div class="input-group">
<input id="password" type="password" placeholder="Пароль">
</div>

<button onclick="register()">
Создать аккаунт
</button>

<div class="message" id="message"></div>

<div class="links">
<a href="login.html">
Уже есть аккаунт?
</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNn0HaZLX-21vNSnXhxZ8CUPS-uxQDFE8",
  authDomain: "ecomap-611ab.firebaseapp.com",
  projectId: "ecomap-611ab",
  storageBucket: "ecomap-611ab.firebasestorage.app",
  messagingSenderId: "548409473929",
  appId: "1:548409473929:web:ea360b0256a5414542bf58"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = async function(){

const email =
document.getElementById('email').value.trim();

const password =
document.getElementById('password').value.trim();

const message =
document.getElementById('message');

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

message.innerHTML =
'✅ Аккаунт создан';

setTimeout(()=>{
window.location.href='login.html';
},1000);

}catch(error){

message.innerHTML =
error.message;

}

}

</script>

</body>
</html>
