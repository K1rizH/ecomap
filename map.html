<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoMap — Карта вторсырья</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
background:#07120e;
color:white;
height:100vh;
overflow:hidden;
}

/* Шапка */

header{
position:absolute;
top:0;
left:0;
right:0;
z-index:1000;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:rgba(7,18,14,.85);
backdrop-filter:blur(15px);
}

.logo{
font-size:30px;
font-weight:800;
color:#35ff9d;
}

.menu{
display:flex;
gap:20px;
}

.menu a{

padding:12px 20px;

border-radius:14px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.1);

color:white;

text-decoration:none;

transition:.3s;
}

.menu a:hover{

background:#35ff9d;

color:#04100b;

transform:translateY(-3px);

}

/* Карта */

#map{
height:100vh;
width:100%;
}

/* Боковая панель */

.sidebar{
position:absolute;
top:100px;
left:30px;

width:320px;

z-index:1000;

padding:25px;

background:rgba(15,35,28,.92);

backdrop-filter:blur(20px);

border-radius:25px;

border:1px solid rgba(255,255,255,.1);

box-shadow:
0 0 35px rgba(53,255,157,.12);
}

.sidebar h2{
margin-bottom:15px;
color:#35ff9d;
font-size:28px;
}

.filter{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:15px;

border:none;
outline:none;

border-radius:14px;

background:#163025;
color:white;
}

.info{
font-size:14px;
line-height:1.8;
color:#cfd6d2;
}

.btn{
width:100%;
margin-top:20px;
padding:15px;

border:none;
border-radius:15px;

background:#35ff9d;

color:#04100b;

font-weight:700;

cursor:pointer;

transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 20px rgba(53,255,157,.4);
}

/* Popup */

.leaflet-popup-content{
font-family:Montserrat,sans-serif;
}

.leaflet-popup-content h3{
color:#1d9f61;
margin-bottom:8px;
}

/* Скрываем Leaflet */

.leaflet-control-attribution{
display:none!important;
}

</style>
</head>
<body>

<header>

<div class="logo">
EcoMap
</div>

<div class="menu">
<a href="cabinet.html">Кабинет</a>
<a href="index.html">Главная</a>
</div>

</header>

<div class="sidebar">

<h2>
♻ Карта вторсырья
</h2>

<select class="filter">
<option>Все отходы</option>
<option>Пластик</option>
<option>Макулатура</option>
<option>Электроника</option>
<option>Стекло</option>
</select>

<div class="info">

📍 На карте отображаются объявления пользователей.

<br><br>

🟢 Зеленые точки — активные объявления.

<br><br>

🚚 Волонтеры и переработчики могут забирать вторсырье напрямую.

<br><br>

♻ Все размещенные объявления автоматически сохраняются.

</div>

<button
class="btn"
onclick="window.location.href='create-waste.html'"
>
Разместить отходы
</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* Создание карты */

const map =
L.map('map').setView([60.9397, 76.5696], 12);

/* Слой карты */

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:''
}
).addTo(map);

/* Стандартные объявления */

const defaultWastes = [

{
lat:60.9397,
lng:76.5696,
type:'Пластик',
amount:'25 кг',
status:'Доступно'
},

{
lat:60.9475,
lng:76.5842,
type:'Макулатура',
amount:'40 кг',
status:'Доступно'
},

{
lat:60.9318,
lng:76.5510,
type:'Электроника',
amount:'12 кг',
status:'Доступно'
},

{
lat:60.9441,
lng:76.6035,
type:'Стекло',
amount:'18 кг',
status:'Доступно'
}

];

/* Пользовательские объявления */

const savedWastes =
JSON.parse(localStorage.getItem('wastes')) || [];

/* Объединяем */

const wastes = [
...defaultWastes,
...savedWastes
];

/* Отрисовка точек */

wastes.forEach(item=>{

/* Если координат нет */

if(!item.lat || !item.lng){

item.lat =
60.93 + Math.random() * 0.03;

item.lng =
76.55 + Math.random() * 0.05;

}

L.marker([item.lat,item.lng])

.addTo(map)

.bindPopup(`

<h3>${item.type}</h3>

${item.photo ? `
<img
src="${item.photo}"
style="
width:220px;
max-height:150px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
display:block;
">
` : ''}

<b>Количество:</b> ${item.amount}<br>

${item.address ? `<b>Адрес:</b> ${item.address}<br>` : ''}

${item.description ? `<b>Описание:</b> ${item.description}<br>` : ''}

<b>Статус:</b> ${item.status || 'Доступно'}

`);

/* Добавление новой точки кликом */

map.on('click',function(e){

L.marker(e.latlng)

.addTo(map)

.bindPopup(
`
<h3>Новая точка</h3>
Точка размещения отходов
`
)

.openPopup();

});

</script>

</body>
</html>
