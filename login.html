<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Авторизация | EcoMap</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:#07120e;

overflow:hidden;

color:white;
}

/* Фон */

body::before{
content:'';

position:absolute;

width:100%;
height:100%;

background:
radial-gradient(circle at 20% 20%,rgba(0,255,150,.25),transparent 35%),
radial-gradient(circle at 80% 30%,rgba(0,200,255,.15),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(0,255,100,.15),transparent 35%);

z-index:-2;
}

/* Карточка */

.login-box{
width:420px;

padding:45px;

border-radius:30px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.1);

box-shadow:
0 0 40px rgba(0,255,150,.15);
}

.logo{
text-align:center;

font-size:38px;

font-weight:800;

margin-bottom:10px;

color:#35ff9d;
}

.subtitle{
text-align:center;

color:#b7c6bf;

margin-bottom:35px;
}

.input-group{
margin-bottom:20px;
}

input{
width:100%;

padding:18px;

border:none;
outline:none;

border-radius:15px;

background:rgba(255,255,255,.08);

color:white;

font-size:15px;
}

button{
width:100%;

padding:18px;

margin-top:10px;

border:none;

border-radius:15px;

background:#35ff9d;

color:#03100b;

font-weight:700;

font-size:16px;

cursor:pointer;

transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.message{
margin-top:18px;

text-align:center;

font-size:14px;

color:#35ff9d;
}

.links{
margin-top:20px;

display:flex;
justify-content:space-between;
}

.links a{
text-decoration:none;
color:#35ff9d;
font-size:14px;
}

</style>
</head>
<body>

<div class="login-box">

<div class="logo">
EcoMap
</div>

<div class="subtitle">
Авторизация пользователя
</div>

<div class="input-group">
<input
id="email"
type="email"
placeholder="Электронная почта"
>
</div>

<div class="input-group">
<input
id="password"
type="password"
placeholder="Пароль"
>
</div>

<button onclick="login()">
Войти
</button>

<div class="message" id="message"></div>

<div class="links">
<a href="register.html">
Регистрация
</a>

<a href="index.html">
На главную
</a>
</div>

</div>

<script>

function login(){

const email =
document.getElementById('email').value.trim();

const password =
document.getElementById('password').value.trim();

const message =
document.getElementById('message');

const savedUser =
JSON.parse(
localStorage.getItem('ecomap_user')
);

/* Проверка */

if(
savedUser &&
savedUser.email === email &&
savedUser.password === password
){

localStorage.setItem(
'loggedIn',
'true'
);

message.innerHTML =
'✅ Успешный вход';

setTimeout(()=>{

window.location.href =
'cabinet.html';

},1000);

}else{

message.innerHTML =
'❌ Неверный логин или пароль';

}

}

</script>

</body>
</html>
